<!doctype html>
<html lang="en" data-dev-mode="{{ 'true' if dev else 'false' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="application-name" content="{{ app_name }}">
  <meta name="trimtank-version" content="{{ version }}">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
  <script src="{{ url_for('static', path='js/app.js') }}" defer></script>
</head>
<body
  data-app-name="{{ app_name }}"
  data-app-version="{{ version }}"
  data-dev-mode="{{ 'true' if dev else 'false' }}"
>
  {% block body %}{% endblock %}
</body>
</html>
